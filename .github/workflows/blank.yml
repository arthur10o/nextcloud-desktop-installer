name: Shell Script Creation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-file:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Debug
        run: |
          echo "Repository content:"
          ls -la

      - name: Create .sh from source file
        run: |
          set -euo pipefail
          if [[ ! -f nextcloud-installer ]]; then
            echo "::error::Source file does not exist. Exiting."
            exit 1
          fi
          echo "Source file exists. Proceeding to create .sh file."
          cp nextcloud-installer nextcloud-installer.sh
          chmod +x nextcloud-installer.sh

      - name: Commit only if changes exist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add nextcloud-installer.sh
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Automated script creation"
          git push
